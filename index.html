<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GameZone</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#050816 0%,#0f172a 45%,#1e293b 100%);
    min-height:100vh;
    color:#f8fafc;
}

header{
    background:linear-gradient(90deg,#111827,#1f2937);
    padding:24px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
}

.logo{
    color:#fbbf24;
    font-size:34px;
    font-weight:bold;
    letter-spacing:1px;
}

.top-search{
    padding:20px;
    max-width:720px;
    margin:0 auto;
}

.search-box{
    width:100%;
    padding:14px 18px;
    border:1px solid #334155;
    border-radius:999px;
    font-size:16px;
    outline:none;
    background:#ffffff;
    color:#0f172a;
}

.categories{
    display:flex;
    gap:12px;
    padding:0 20px 20px;
    flex-wrap:wrap;
    justify-content:center;
}

.category-btn{
    border:none;
    padding:12px 18px;
    border-radius:999px;
    background:#f8fafc;
    color:#0f172a;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.category-btn:hover{
    background:#fbbf24;
    transform:translateY(-2px);
}

.games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:24px;
    padding:20px;
    max-width:1200px;
    margin:0 auto 30px;
}

.game-card{
    background:rgba(255,255,255,0.96);
    color:#0f172a;
    border-radius:20px;
    overflow:hidden;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    display:flex;
    flex-direction:column;
}

.game-card:hover{
    transform:translateY(-8px) scale(1.02);
    box-shadow:0 16px 30px rgba(0,0,0,0.35);
}

.game-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    display:block;
    background-color:#1f2937;
}

.game-info{
    padding:16px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    flex:1;
}

.game-info h3{
    margin:0;
    color:#111827;
    text-align:center;
    font-size:18px;
}

.play-btn{
    display:inline-block;
    background:linear-gradient(90deg,#2563eb,#1d4ed8);
    color:white;
    padding:10px 18px;
    border-radius:999px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s transform, 0.3s box-shadow, 0.3s background;
    box-shadow:0 8px 16px rgba(37,99,235,0.25);
}

.play-btn:hover{
    background:linear-gradient(90deg,#1d4ed8,#2563eb);
    transform:translateY(-3px);
    box-shadow:0 12px 22px rgba(37,99,235,0.35);
}

footer{
    margin-top:30px;
    background:#0f172a;
    color:#cbd5e1;
    text-align:center;
    padding:20px;
}

@media(max-width:768px){
    .logo{
        font-size:28px;
    }
}

</style>

</head>

<body>

<header>

    <div class="logo">🎮 GameZone</div>

</header>

<!-- PESQUISA -->

<div class="top-search">

    <input 
    type="text" 
    class="search-box"
    id="searchInput"
    placeholder="Pesquisar jogos..."
    >

</div>

<!-- CATEGORIAS -->

<section class="categories">

    <button class="category-btn">Ação</button>
    <button class="category-btn">Corrida</button>
    <button class="category-btn">Arcade</button>
    <button class="category-btn">Pixel</button>
    <button class="category-btn">Aventura</button>

</section>

<!-- JOGOS -->

<main class="games-grid" id="gamesGrid">

    <div class="game-card">
        <img src="capa.jpg" alt="Turbo Race">
        <div class="game-info">
            <h3>Turbo Race</h3>
            <a href="https://www.astrocade.com/games/turbo-race/01KS7MMFNP9ZND1ZT2EAEMFTNS?sharedByCreator=pedro.1186&surface=web" target="_blank" class="play-btn">Jogar</a>
        </div>
    </div>

    <div class="game-card">
        <img src="capa.jpg" alt="Fruit Slither">
        <div class="game-info">
            <h3>Fruit Slither</h3>
            <a href="https://www.astrocade.com/games/fruit-slither/01KS0HS0HM9BTYQGT4KYZKRM37?sharedByCreator=pedro.1186&surface=web" target="_blank" class="play-btn">Jogar</a>
        </div>
    </div>

    <div class="game-card">
        <img src="capa.jpg" alt="Zombie Blitz">
        <div class="game-info">
            <h3>Zombie Blitz</h3>
            <a href="https://www.astrocade.com/games/zombie-blitz/01KRGH8P2TCX9NCJS5ZRRB9MQ8?sharedByCreator=pedro.1186&surface=web" target="_blank" class="play-btn">Jogar</a>
        </div>
    </div>

    <div class="game-card">
        <img src="capa.jpg" alt="Cloud Hopper">
        <div class="game-info">
            <h3>Cloud Hopper</h3>
            <a href="https://www.astrocade.com/games/cloud-hopper/01KRGG0ATXKEDY961AKKNSJJWF?sharedByCreator=pedro.1186&surface=web" target="_blank" class="play-btn">Jogar</a>
        </div>
    </div>

    <div class="game-card">
        <img src="capa.jpg" alt="Zombie Attack">
        <div class="game-info">
            <h3>Zombie Attack</h3>
            <a href="https://www.astrocade.com/games/dead-front/01KR35PAGA4RH7PHJ0WYPAFWB9?sharedByPlayer=pedro.1186&surface=web&sharePlatform=desktop_copylink" target="_blank" class="play-btn">Jogar</a>
        </div>
    </div>

    <div class="game-card">
        <img src="capa.jpg" alt="Chicken Road">
        <div class="game-info">
            <h3>Chicken Road</h3>
            <a href="https://www.astrocade.com/games/chicken-road/01KTRJCMM3SYRXAPP8ZS9BMV0T?sharedByCreator=pedro.1186&surface=web&sharePlatform=copylink&shareId=8252e142-bcd0-471f-a96e-555dd648787a&shareOrigin=analytics" target="_blank" class="play-btn">Jogar</a>
        </div>
    </div>

    <div class="game-card">
        <img src="capa.jpg" alt="Sky Riders">
        <div class="game-info">
            <h3>Sky Riders</h3>
            <a href="https://www.crazygames.com/embed/sky-riders" target="_blank" class="play-btn">Jogar</a>
        </div>
    </div>

</main>

<footer>

© 2026 GameZone - Todos os direitos reservados

</footer>

<script>

/* PESQUISA */

const searchInput = document.getElementById('searchInput');

const gameCards = document.querySelectorAll('.game-card');

searchInput.addEventListener('keyup', () => {

    const value = searchInput.value.toLowerCase();

    gameCards.forEach(card => {

        const title = card.querySelector('h3')
        .textContent.toLowerCase();

        if(title.includes(value)){

            card.style.display = 'block';

        }else{

            card.style.display = 'none';

        }

    });

});

</script>

</body>
</html>
